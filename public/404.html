<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Space Tourism</title>
    <script>
      // SPA redirect trick for GitHub Pages
      // Saves the full URL to sessionStorage then redirects to the base path
      const path =
        globalThis.location.pathname.replace("/space-tourism", "") || "/";
      sessionStorage.setItem("spa-redirect", path + globalThis.location.search);
      globalThis.location.replace("/space-tourism/");
    </script>
  </head>
  <body></body>
</html>
