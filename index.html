<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/img/shared/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore space destinations, meet the crew, and discover launch technology. A multi-page space tourism website built with React, TypeScript, and Tailwind CSS."
    />
    <meta property="og:title" content="Space Tourism" />

      content="Explore space destinations, meet the crew, and discover launch technology."
    />

    <meta property="og:image" content="/img/shared/logo.svg" />
    <title>Space Tourism</title>
    <script>
      // Restore route after GitHub Pages 404 redirect
      var redirect = sessionStorage.getItem("spa-redirect");
      if (redirect) {
        sessionStorage.removeItem("spa-redirect");
        history.replaceState(null, "", redirect);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
